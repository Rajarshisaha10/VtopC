<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="Hh2FfBaeUJfNsm2wMHU2LxQkJN5k0Thx0DMSVjsMvow" />
    <title>VTOPC - Login</title>
    <meta name="description" content="VtopC is a modern, fast, and responsive client for VTOP Student Portal for Chennai Campus. Access your attendance, marks, timetable, and calculate attendance requirements with a better UI/UX.">
    <meta name="keywords" content="VTOPC, VTOPC Login, Vellore Institute of Technology Chennai, Student Portal, Attendance Calculator, VtopC, Timetable, Better Vtop">
    <meta name="author" content="VtopC Team">
    <meta name="robots" content="index, follow">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vtopc.onrender.com/"> <meta property="og:title" content="VtopC - The Better VTOP Experience">
    <meta property="og:description" content="A faster, cleaner way to check your VTOP attendance, marks, and schedule. Includes a built-in attendance calculator.">
    <meta property="og:image" content="{{ url_for('static', filename='icon-512.png') }}">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://vtopc.onrender.com/"> <meta property="twitter:title" content="VtopC - VTOP but Cooler">
    <meta property="twitter:description" content="Login to VtopC for a modern dashboard, dark mode, and instant attendance insights.">
    <meta property="twitter:image" content="{{ url_for('static', filename='icon-512.png') }}">
    
    <meta name="theme-color" content="#2563eb">
    
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    
    <!-- LOCAL TAILWIND -->
    <script src="{{ url_for('static', filename='tailwind.js') }}"></script>
    <script>
        tailwind.config = { darkMode: 'media' } 
    </script>
    
    <!-- LOCAL LUCIDE ICONS (Replaces FontAwesome) -->
    <script src="{{ url_for('static', filename='lucide.js') }}"></script>

    <!-- Google Fonts (Optional fallback) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-blue-50 dark:from-gray-900 dark:via-gray-900 dark:to-blue-950 flex flex-col min-h-screen p-4 transition-colors duration-200">
    <div class="w-full max-w-6xl mx-auto flex-1 flex items-center justify-center">
        
        <div id="loadingContainer" class="text-center p-8">
            <i data-lucide="loader" class="animate-spin w-10 h-10 text-blue-600 dark:text-blue-400 mx-auto"></i>
            <p class="mt-4 text-gray-600 dark:text-gray-400">Checking for a saved session...</p>
        </div>

        <div id="loginContainer" class="hidden w-full max-w-md mx-auto bg-white dark:bg-gray-800 p-8 sm:p-10 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 transition-all duration-300 section-enter">
            <div class="flex justify-center mb-6">
                <div class="h-12 w-12 rounded-xl bg-blue-600 flex items-center justify-center text-white">
                    <i data-lucide="graduation-cap" class="h-7 w-7"></i>
                </div>
            </div>
            <h1 class="text-2xl font-bold text-center text-gray-900 dark:text-white mb-2 tracking-tight">VTOP Client</h1>
            <p class="text-center text-gray-500 dark:text-gray-400 mb-8 font-medium">Enter your credentials to continue.</p>
            
            <form id="loginForm" class="space-y-6">
                <input type="hidden" id="sessionId">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username</label>
                    <div class="relative rounded-md shadow-sm">
                        <div class="pointer-events-none absolute inset-y-0 left-0 pl-3 flex items-center">
                            <i data-lucide="user" class="w-5 h-5 text-gray-400"></i>
                        </div>
                        <input type="text" id="username" name="username" required class="block w-full pl-10 pr-3 py-3 border border-gray-200 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700/50 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-sm hover:border-gray-300 dark:hover:border-gray-500" placeholder="Registration No.">
                    </div>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                    <div class="relative rounded-md shadow-sm">
                        <div class="pointer-events-none absolute inset-y-0 left-0 pl-3 flex items-center">
                            <i data-lucide="lock" class="w-5 h-5 text-gray-400"></i>
                        </div>
                        <input type="password" id="password" name="password" required class="block w-full pl-10 pr-10 py-3 border border-gray-200 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700/50 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-sm hover:border-gray-300 dark:hover:border-gray-500" placeholder="Your Password">
                        
                        <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors focus:outline-none">
                            <!-- Toggling logic swaps hidden class -->
                            <i data-lucide="eye" id="icon-eye" class="w-5 h-5"></i>
                            <i data-lucide="eye-off" id="icon-eye-off" class="w-5 h-5 hidden"></i>
                        </button>
                    </div>
                </div>
                
                <div id="captchaGroup" class="hidden space-y-3">
                     <label for="captcha" class="block text-sm font-medium text-gray-700 dark:text-gray-300">CAPTCHA</label>
                     <div id="captchaImageContainer" class="flex items-center justify-center bg-gray-100 dark:bg-gray-900 rounded-lg h-20 p-2 border border-gray-200 dark:border-gray-600 overflow-hidden">
                        </div>
                     <input type="text" id="captcha" name="captcha" class="block w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700/50 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent uppercase tracking-widest transition-all shadow-sm hover:border-gray-300 dark:hover:border-gray-500" placeholder="ENTER TEXT" autocomplete="off">
                </div>
                
                <div class="pt-2">
                    <button type="submit" id="loginButton" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                        <span id="loginButtonText">Login</span>
                        <i data-lucide="loader" id="loginButtonSpinner" class="animate-spin ml-2 w-4 h-4 hidden"></i>
                    </button>
                </div>
            </form>
            <div id="statusMessage" class="mt-6 text-center text-sm font-medium min-h-[20px]"></div>
        </div>
        
    </div>
    
    {% include 'global_components/footer.html' %}

    <script type="module" src="{{ url_for('static', filename='login.js') }}"></script>
    <script>
        // Initialize Lucide icons immediately for the loading spinner
        if(typeof lucide !== 'undefined') lucide.createIcons();
    </script>
</body>

</html>
