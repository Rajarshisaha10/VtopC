<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team AIP - VtopC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 via-white to-blue-50 dark:from-gray-900 dark:via-gray-900 dark:to-blue-950 text-gray-900 dark:text-white min-h-screen flex flex-col">

    <main class="flex-grow max-w-5xl mx-auto px-6 py-12 w-full">
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-sky-600 dark:from-blue-400 dark:to-sky-400 pb-1">Meet Team AIP</h1>
            <p class="text-gray-600 dark:text-gray-400">The developers behind VtopC.</p>
        </div>

        <!-- Team Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">

            <!-- Team Member Card 1 -->
            <div
                class="bg-white dark:bg-gray-800 rounded-3xl shadow-lg ring-1 ring-black/5 dark:ring-white/5 border border-gray-100 dark:border-gray-700 p-8 flex flex-col items-center text-center group section-enter">
                <img src="https://github.com/kumar-shaurya.png" alt="Kumar Shaurya"
                    class="w-24 h-24 rounded-full object-cover mb-5 border-4 border-white dark:border-gray-800 shadow-lg group-hover:ring-4 ring-blue-500/30 transition-all duration-300">

                <h3 class="font-bold text-lg mb-1">Kumar Shaurya</h3>
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-4">Developer</p>

                <!-- GitHub Link -->
                <a href="https://github.com/kumar-shaurya" target="_blank"
                    class="mt-auto inline-flex items-center justify-center gap-2 text-sm font-bold bg-gray-50 dark:bg-gray-700/50 text-gray-700 dark:text-gray-300 hover:bg-blue-50 hover:text-blue-600 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-colors px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 shadow-sm">
                    <i data-lucide="github" class="w-4 h-4"></i> GitHub Profile
                </a>
            </div>

            <div
                class="bg-white dark:bg-gray-800 rounded-3xl shadow-lg ring-1 ring-black/5 dark:ring-white/5 border border-gray-100 dark:border-gray-700 p-8 flex flex-col items-center text-center group section-enter">
                <img src="https://github.com/VedantJJA.png" alt="Vedant"
                    class="w-24 h-24 rounded-full object-cover mb-5 border-4 border-white dark:border-gray-800 shadow-lg group-hover:ring-4 ring-blue-500/30 transition-all duration-300">

                <h3 class="font-bold text-lg mb-1">Vedant</h3>
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-4">Developer</p>

                <!-- GitHub Link -->
                <a href="https://github.com/VedantJJA" target="_blank"
                    class="mt-auto inline-flex items-center justify-center gap-2 text-sm font-bold bg-gray-50 dark:bg-gray-700/50 text-gray-700 dark:text-gray-300 hover:bg-blue-50 hover:text-blue-600 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-colors px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 shadow-sm">
                    <i data-lucide="github" class="w-4 h-4"></i> GitHub Profile
                </a>
            </div>

            <div
                class="bg-white dark:bg-gray-800 rounded-3xl shadow-lg ring-1 ring-black/5 dark:ring-white/5 border border-gray-100 dark:border-gray-700 p-8 flex flex-col items-center text-center group section-enter">
                <img src="https://github.com/Rajarshisaha10.png" alt="Rajarshi Saha"
                    class="w-24 h-24 rounded-full object-cover mb-5 border-4 border-white dark:border-gray-800 shadow-lg group-hover:ring-4 ring-blue-500/30 transition-all duration-300">

                <h3 class="font-bold text-lg mb-1">Rajarshi Saha</h3>
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-4">Developer</p>

                <!-- GitHub Link -->
                <a href="https://github.com/Rajarshisaha10" target="_blank"
                    class="mt-auto inline-flex items-center justify-center gap-2 text-sm font-bold bg-gray-50 dark:bg-gray-700/50 text-gray-700 dark:text-gray-300 hover:bg-blue-50 hover:text-blue-600 dark:hover:bg-blue-900/30 dark:hover:text-blue-300 transition-colors px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 shadow-sm">
                    <i data-lucide="github" class="w-4 h-4"></i> GitHub Profile
                </a>
            </div>

        </div>

        <!-- Back Button -->
        <div class="mt-16 text-center">
            <a href="{{ url_for('index') }}"
                class="inline-flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-700 transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Dashboard
            </a>
        </div>
    </main>

    <!-- Include your shiny new global footer here too! -->
    {% include 'global_components/footer.html' %}

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
