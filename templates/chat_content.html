<div id="chat-container" class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 flex flex-col h-[calc(100vh-180px)]">
    <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-indigo-600 rounded-t-xl">
        <div>
            <h3 class="font-bold text-white text-lg" id="chat-room-title">Room Chat</h3>
            <p class="text-xs text-indigo-100" id="chat-room-subtitle">Connecting to roommates...</p>
        </div>
        <div class="flex items-center space-x-2 bg-indigo-500/30 px-3 py-1.5 rounded-full border border-indigo-400/30">
            <span class="h-2 w-2 rounded-full bg-green-400 animate-pulse"></span>
            <span class="text-xs font-bold text-white tracking-wide">LIVE</span>
        </div>
    </div>

    <!-- Message List -->
    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 bg-gray-50 dark:bg-gray-900/50 scroll-smooth custom-scrollbar">
        <div class="flex flex-col items-center justify-center h-full text-gray-400 space-y-3">
            <i data-lucide="loader" class="animate-spin h-8 w-8 text-indigo-500"></i>
            <p class="text-sm font-medium italic">Fetching conversation...</p>
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-4 border-t border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-b-xl">
        <div class="flex items-end space-x-2 max-w-5xl mx-auto">
            <div class="flex-1 bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded-2xl p-2 focus-within:ring-2 focus-within:ring-indigo-500 shadow-sm transition-all">
                <textarea id="chat-input" rows="1" placeholder="Type a message to your roommates..." 
                    class="w-full bg-transparent border-none focus:ring-0 text-sm resize-none dark:text-white max-h-32 py-2 px-3"></textarea>
                
                <div class="flex justify-between items-center px-2 pb-1 pt-1 border-t border-gray-200 dark:border-gray-600/50 mt-1">
                    <div class="flex items-center space-x-1">
                        <input type="file" id="chat-file-input" class="hidden" accept="image/*,.pdf">
                        <button onclick="document.getElementById('chat-file-input').click()" 
                            class="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 rounded-full transition-colors"
                            title="Attach File">
                            <i data-lucide="paperclip" class="w-4 h-4"></i>
                        </button>
                        <div id="chat-file-indicator" class="hidden flex items-center px-2 py-0.5 bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-300 text-[10px] font-bold rounded border border-indigo-200 dark:border-indigo-800">
                            <i data-lucide="file-check" class="w-3 h-3 mr-1"></i> File Attached
                        </div>
                    </div>
                    <span class="text-[10px] text-gray-400 dark:text-gray-500 font-medium">Shift + Enter for new line</span>
                </div>
            </div>
            <button id="send-chat-btn" 
                class="bg-indigo-600 hover:bg-indigo-700 text-white p-3.5 rounded-2xl shadow-lg transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                <i data-lucide="send" class="w-5 h-5"></i>
            </button>
        </div>
    </div>
</div>
<script>
    if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
